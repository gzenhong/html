<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>歷史回撤分析</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--sf:#161921;--sf2:#1e2230;--bd:#2a2f3e;--tx:#e8eaf0;--mu:#6b7280;--ac:#f59e0b;--re:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"Noto Serif TC",serif;min-height:100vh}
header{padding:36px 40px 24px;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,#1a1d28,var(--bg))}
header h1{font-size:1.8rem;font-weight:700;color:var(--ac);letter-spacing:.04em}
header p{margin-top:6px;color:var(--mu);font-size:.8rem;font-family:"JetBrains Mono",monospace}
#ctrlbar{padding:14px 40px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--bd);background:var(--sf);position:sticky;top:0;z-index:100}
.tb{background:var(--sf2);border:1px solid var(--bd);color:var(--mu);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:.76rem;font-family:"JetBrains Mono",monospace;transition:all .15s}
.tb:hover{border-color:var(--ac);color:var(--tx)}
.tb.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:700}
.tb.lv{border-color:var(--re)}
.tb.lv.on{background:var(--re);border-color:var(--re);color:#fff}
main{padding:24px 40px}
#sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:24px}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:14px 16px}
.sc .lb{font-size:.65rem;color:var(--mu);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-family:"JetBrains Mono",monospace}
.sc .vl{font-size:1.35rem;font-weight:700;font-family:"JetBrains Mono",monospace;color:var(--ac)}
.sc .sb{font-size:.7rem;color:var(--mu);margin-top:2px}
.stitle{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;font-family:"JetBrains Mono",monospace;border-left:3px solid var(--ac);padding-left:9px}
#chartbox{background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:18px;margin-bottom:24px}
#filterrow{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:"JetBrains Mono",monospace;font-size:.76rem;color:var(--mu)}
#filterrow select{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:4px;font-size:.76rem;font-family:"JetBrains Mono",monospace}
#rowcount{margin-left:auto;font-size:.72rem;color:var(--mu)}
#tablebox{background:var(--sf);border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:32px}
table{width:100%;border-collapse:collapse}
th{background:var(--sf2);padding:9px 12px;text-align:left;font-size:.66rem;letter-spacing:.08em;color:var(--mu);font-family:"JetBrains Mono",monospace;border-bottom:1px solid var(--bd);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--ac)}
td{padding:8px 12px;border-bottom:1px solid var(--bd);font-family:"JetBrains Mono",monospace;font-size:.76rem;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sf2)}
.dp{display:inline-block;padding:2px 7px;border-radius:3px;font-weight:700;font-size:.74rem}
.dm{background:rgba(234,179,8,.15);color:#eab308}
.ds{background:rgba(249,115,22,.15);color:#f97316}
.dv{background:rgba(239,68,68,.15);color:#ef4444}
.de{background:rgba(167,139,250,.15);color:#a78bfa}
.rf{color:#22c55e}.rm{color:#3b82f6}.rl{color:#f97316}.rn{color:var(--mu)}
.bb{display:inline-block;width:64px;height:5px;background:var(--bd);border-radius:2px;vertical-align:middle}
.bf{height:5px;background:var(--re);border-radius:2px}
footer{margin:0 40px 32px;padding:14px;border:1px solid var(--bd);border-radius:6px;font-size:.72rem;color:var(--mu);background:var(--sf);line-height:1.6}
footer strong{color:var(--ac)}
@media(max-width:640px){header,#ctrlbar,main,footer{padding-left:16px;padding-right:16px}}
</style>
</head>
<body>
<header>
  <h1>📉 歷史回撤事件分析</h1>
  <p>數據截止：2026-03-31 ｜ 回撤計算：High→Low ｜ 回本計算：Adj Close ｜ 閾值：一般 -15%，槓桿 -30%</p>
</header>

<div id="ctrlbar"><!-- ticker buttons injected by JS --></div>

<main>
  <div id="sgrid"><!-- summary cards --></div>
  <div class="stitle">回撤深度時間軸（泡泡 = 跌幅大小）</div>
  <div id="chartbox"><canvas id="bc" height="90"></canvas></div>
  <div class="stitle">歷史回撤事件明細</div>
  <div id="filterrow">
    跌幅篩選：
    <select id="ddsel">
      <option value="0">全部</option>
      <option value="15">&#8805; 15%</option>
      <option value="20">&#8805; 20%</option>
      <option value="25">&#8805; 25%</option>
      <option value="30">&#8805; 30%</option>
      <option value="35">&#8805; 35%</option>
      <option value="40">&#8805; 40%</option>
      <option value="50">&#8805; 50%</option>
      <option value="60">&#8805; 60%</option>
    </select>
    <span id="rowcount"></span>
  </div>
  <div id="tablebox">
    <table>
      <thead>
        <tr>
          <th data-col="0">標的</th>
          <th data-col="1">高點日期</th>
          <th data-col="2">高點價</th>
          <th data-col="3">低點日期</th>
          <th data-col="4">低點價</th>
          <th data-col="5">最大跌幅</th>
          <th>深度</th>
          <th data-col="7">回本日期</th>
          <th data-col="8">回本天數</th>
        </tr>
      </thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</main>

<footer><strong>⚠️ 免責聲明</strong>｜以上分析僅供參考，不構成任何投資建議，投資有風險請自行評估。</footer>

var LEVERAGED = new Set(['00670L','00647L','00631L']);
var TICKERS   = Object.keys(RAW);
var COLORS    = {'0050':'#f59e0b','2330':'#3b82f6','0056':'#22c55e','00919':'#a78bfa','00878':'#f97316','00662':'#06b6d4','00646':'#ec4899','00670L':'#ef4444','00647L':'#dc2626','00631L':'#b91c1c','2308':'#8b5cf6'};

var active  = new Set(TICKERS);
var ddMin   = 0;
var sortCol = 5;
var sortAsc = true;
var chart   = null;

// ── Ticker buttons ──
var ctrlbar = document.getElementById('ctrlbar');
TICKERS.forEach(function(t) {
  var btn = document.createElement('button');
  btn.className = 'tb on' + (LEVERAGED.has(t) ? ' lv' : '');
  btn.textContent = t;
  btn.dataset.t = t;
  btn.addEventListener('click', function() {
    if (active.has(t)) { active.delete(t); btn.classList.remove('on'); }
    else               { active.add(t);    btn.classList.add('on'); }
    redraw();
  });
  ctrlbar.appendChild(btn);
});
var sep = document.createElement('span');
sep.style.cssText = 'width:1px;height:22px;background:var(--bd);margin:0 2px';
ctrlbar.appendChild(sep);
var allBtn = document.createElement('button');
allBtn.className = 'tb';
allBtn.textContent = '全選';
allBtn.addEventListener('click', function() {
  var allOn = TICKERS.every(function(t){ return active.has(t); });
  TICKERS.forEach(function(t){ allOn ? active.delete(t) : active.add(t); });
  ctrlbar.querySelectorAll('.tb[data-t]').forEach(function(b){
    b.classList.toggle('on', active.has(b.dataset.t));
  });
  redraw();
});
ctrlbar.appendChild(allBtn);

// ── Filter select — bind once, always works ──
document.getElementById('ddsel').addEventListener('change', function() {
  ddMin = +this.value;
  redraw();
});

// ── Sort headers — bind once ──
document.querySelectorAll('th[data-col]').forEach(function(th) {
  th.addEventListener('click', function() {
    var c = +th.dataset.col;
    if (sortCol === c) sortAsc = !sortAsc;
    else { sortCol = c; sortAsc = true; }
    redraw();
  });
});

// ── Data helpers ──
function getRows() {
  var rows = [];
  TICKERS.forEach(function(t) {
    if (!active.has(t)) return;
    RAW[t].forEach(function(e) {
      if (Math.abs(e.max_dd_pct) >= ddMin) rows.push(Object.assign({ticker:t}, e));
    });
  });
  rows.sort(function(a,b) {
    var va, vb;
    switch(sortCol) {
      case 0: va=a.ticker;      vb=b.ticker;      break;
      case 1: va=a.peak_date;   vb=b.peak_date;   break;
      case 2: va=a.peak_high;   vb=b.peak_high;   break;
      case 3: va=a.trough_date; vb=b.trough_date; break;
      case 4: va=a.trough_low;  vb=b.trough_low;  break;
      case 5: va=a.max_dd_pct;  vb=b.max_dd_pct;  break;
      case 7: va=a.recovery_date||'zzzz'; vb=b.recovery_date||'zzzz'; break;
      default:va=a.recovery_days||99999;  vb=b.recovery_days||99999;
    }
    return sortAsc ? (va<vb?-1:va>vb?1:0) : (va>vb?-1:va<vb?1:0);
  });
  return rows;
}

function ddCls(v) { var a=Math.abs(v); return a<20?'dm':a<30?'ds':a<50?'dv':'de'; }
function recCls(d) { return !d?'rn':d<=90?'rf':d<=300?'rm':'rl'; }

// ── Render ──
function drawSummary(rows) {
  if (!rows.length) { document.getElementById('sgrid').innerHTML=''; return; }
  var worst = rows.reduce(function(a,b){ return b.max_dd_pct<a.max_dd_pct?b:a; }, rows[0]);
  var avgDD = (rows.reduce(function(s,r){ return s+r.max_dd_pct; },0)/rows.length).toFixed(1);
  var recs  = rows.filter(function(r){ return r.recovery_days; });
  var avgR  = recs.length ? Math.round(recs.reduce(function(s,r){ return s+r.recovery_days; },0)/recs.length) : 0;
  var maxR  = recs.length ? Math.max.apply(null,recs.map(function(r){ return r.recovery_days; })) : 0;
  var total = Object.values(RAW).reduce(function(s,a){ return s+a.length; },0);
  function card(lb,vl,sb,st){ return '<div class="sc"><div class="lb">'+lb+'</div><div class="vl" style="'+st+'">'+vl+'</div><div class="sb">'+sb+'</div></div>'; }
  document.getElementById('sgrid').innerHTML =
    card('篩選後事件數', rows.length, '共'+total+'個全部事件', '') +
    card('最大跌幅', worst.max_dd_pct.toFixed(1)+'%', worst.ticker+' '+worst.trough_date, 'color:#ef4444') +
    card('平均跌幅', avgDD+'%', '篩選範圍內', '') +
    card('平均回本', avgR+'天', '已回本事件', 'color:#3b82f6') +
    card('最長回本', maxR+'天', '歷史最長', 'color:#f97316') +
    card('尚未回本', rows.filter(function(r){ return !r.recovery_date; }).length, '進行中', 'color:#a78bfa');
}

function drawChart(rows) {
  var datasets = [];
  TICKERS.forEach(function(t) {
    if (!active.has(t)) return;
    var eps = rows.filter(function(r){ return r.ticker===t; });
    if (!eps.length) return;
    datasets.push({
      label: t,
      data: eps.map(function(e) {
        var d=new Date(e.trough_date);
        return { x: d.getFullYear()+d.getMonth()/12+d.getDate()/365, y: e.max_dd_pct, r: Math.min(Math.sqrt(Math.abs(e.max_dd_pct))*2.5,30), ep: e };
      }),
      backgroundColor: COLORS[t]+'88', borderColor: COLORS[t], borderWidth: 1
    });
  });
  var ctx = document.getElementById('bc').getContext('2d');
  if (chart) chart.destroy();
  chart = new Chart(ctx, {
    type:'bubble', data:{datasets:datasets},
    options:{
      responsive:true, layout:{padding:{top:20}},
      plugins:{
        legend:{labels:{color:'#9ca3af',font:{family:'JetBrains Mono',size:11}}},
        tooltip:{callbacks:{label:function(item){ var e=item.raw.ep; return e?item.dataset.label+' '+e.trough_date+' '+e.max_dd_pct.toFixed(1)+'%':''; }}}
      },
      scales:{
        x:{type:'linear',ticks:{color:'#6b7280',font:{size:10},callback:function(v){return Math.round(v)+''}},grid:{color:'#1e2230'}},
        y:{ticks:{color:'#6b7280',font:{size:10},callback:function(v){return v+'%'}},grid:{color:'#1e2230'}}
      }
    }
  });
}

function drawTable(rows) {
  document.getElementById('rowcount').textContent = '共 '+rows.length+' 筆';
  var tb = document.getElementById('tb');
  tb.innerHTML = rows.length === 0
    ? '<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--mu)">無符合條件的資料</td></tr>'
    : rows.map(function(r) {
        var barW = Math.min(Math.abs(r.max_dd_pct)/90*100,100).toFixed(1);
        return '<tr>'+
          '<td style="color:'+COLORS[r.ticker]+';font-weight:700">'+r.ticker+'</td>'+
          '<td>'+r.peak_date+'</td>'+
          '<td>'+r.peak_high.toLocaleString()+'</td>'+
          '<td>'+r.trough_date+'</td>'+
          '<td>'+r.trough_low.toLocaleString()+'</td>'+
          '<td><span class="dp '+ddCls(r.max_dd_pct)+'">'+r.max_dd_pct.toFixed(1)+'%</span></td>'+
          '<td><span class="bb"><span class="bf" style="width:'+barW+'%"></span></span></td>'+
          '<td style="color:var(--mu)">'+(r.recovery_date||'⏳ 尚未回本')+'</td>'+
          '<td class="'+recCls(r.recovery_days)+'">'+(r.recovery_days?r.recovery_days+'天':'—')+'</td>'+
          '</tr>';
      }).join('');
}

function redraw() {
  var rows = getRows();
  drawSummary(rows);
  drawChart(rows);
  drawTable(rows);
}

// ── 等 Chart.js 載入後才執行 ──
window.addEventListener('load', function() {
  // Force sync: ddMin from select, select from ddMin
  var sel = document.getElementById('ddsel');
  sel.value = String(ddMin);   // set select to match ddMin (0 = 全部)
  redraw();
});
</script>
